version: '3'

services:
  app:
    build: .
    container_name: app-container
    ports:
      - "3000:3000"
    volumes:
      - ./data/certbot:/var/www/certbot
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - your-network

  nginx:
    image: nginx:latest
    container_name: nginx-container
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./data/certbot:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    networks:
      - your-network

networks:
  your-network:
    driver: bridge
